kind = "web"
  previewPath = "/"
  title = "ASCENDX Fitness Hero"
  version = "1.0.0"
  id = "artifacts/ascendx"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 22360

  [services.development]
  run = "pnpm --filter @workspace/ascendx run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/ascendx", "run", "build" ]
  publicDir = "artifacts/ascendx/out"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "22360"
  